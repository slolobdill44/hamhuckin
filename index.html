<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Ham Huckin'</title>
  </head>

  <link href="https://fonts.googleapis.com/css?family=Dosis:700" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <script src="lib/matter.js" type="text/javascript"></script>
  <script src="lib/decomp.min.js" type="text/javascript"></script>
  <script src="lib/hamhuckin.js" type="text/javascript"></script>

  <body id="game-screen" onload="gameStart()">
    <div id="canvas-wrapper">
    <div class="shots-text">
      Tosses Left:<div class="shots-number">5</div>
    </div>
    <div class="score-text">
      Score:<div class="score-number">0</div>
    </div>
    <div class="stack-height"></div>

    <div id='title-screen'>
      <div class='title-screen-text'>
        <div class='welcome-text'>Welcome to Ham Huckin'</div>
        <div class='game-instructions' id='game-instructions'>press and hold spacebar to aim the bacon!</div>
        <div class='start-instructions' id='start-instructions'>click anywhere to start</div>
      </div>
    </div>

    <div id='ending-screen'>
      <div class='ending-screen-text'>
        <div class='game-over-text'>Game Over!</div>
        <div class='ending-score-text'>Your score was: <div class='score-number'>0</div></div>
        <div class='high-score-text'>Session High Score: <div class='high-score-number'>0</div></div>
        <div class='game-over-text'>Click anywhere to restart</div>
      </div>
    </div>

    </div><!-- /canvas-wrapper -->

    <header id="info-nav">
      <p>
        <strong class="title-text">Ham Huckin'</strong>
        <a href="https://github.com/slolobdill44"><img class="github-img" src="assets/github.png" /></a>
        <span class="rotate-hint">rotate your device for optimal experience 🔄</span>
      </p>
    </header>
    <script>
      if (window.matchMedia('(pointer: coarse)').matches) {
        document.getElementById('game-instructions').textContent = 'tap and hold to aim the bacon!';
        document.getElementById('start-instructions').textContent = 'tap anywhere to start';
      }
    </script>
  </body>


</html>
