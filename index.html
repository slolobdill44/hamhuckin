<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Table Tosser</title>
  </head>

  <link href="https://fonts.googleapis.com/css?family=Dosis:700" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <script src="lib/matter.js" type="text/javascript"></script>
  <script src="lib/decomp.min.js" type="text/javascript"></script>
  <script src="lib/hamhuckin.js" type="text/javascript"></script>

  <body id="game-screen" onload="gameStart()">
    <header id="info-nav">
      <p>
        <strong class="title-text">Table Tosser</strong>
        <a href="https://github.com/slolobdill44"><img class="github-img" src="assets/github.png" /></a>
      </p>
    </header>

    <div id="canvas-wrapper">
    <div class="shots-text">
      <span class="shots-label">Tosses Left:</span><div class="shots-number">5</div>
      <div class="bonus-text">
        <div class="bonus-label">Bonus!</div>
        <div class="bonus-explainer">Keep shooting and build your stack</div>
      </div>
    </div>
    <div class="score-text">
      Score:<div class="score-number">0</div>
    </div>
    <div class="stack-height"></div>

    <div id='title-screen'>
      <div class='title-screen-text'>
        <div class='welcome-text'>Welcome to Table Tosser</div>
        <div class='game-instructions' id='game-instructions'>Press and hold spacebar to aim!</div>
        <div class='game-instructions' id='game-instructions'>Choose an item:</div>
        <div class='picker-options'>
          <button class='picker-option' data-throwable='burger' ><img src='assets/hamburger.png' alt='Burger'></button>
          <button class='picker-option' data-throwable='fish'><img src='assets/fish.png' alt='Fish'></button>
          <button class='picker-option' data-throwable='rubberDuck'><img src='assets/rubber-duck.png' alt='Rubber Duck'></button>
        </div>
      </div>
    </div>

    <div id='ending-screen'>
      <div class='ending-screen-text'>
        <div class='game-over-text'>Game Over!</div>
        <div class='ending-score-text'>Your score was: <div class='score-number'>0</div></div>
        <div class='high-score-text'>Session High Score: <div class='high-score-number'>0</div></div>
        <div class='game-over-text' id='restart-instructions'>Click anywhere to restart</div>
        <div class='or-divider'>or <button id='choose-new-object' class='new-object-btn'>click here to toss something else</button></div>
      </div>
    </div>

    </div><!-- /canvas-wrapper -->

    <script>
      if (window.matchMedia('(pointer: coarse)').matches) {
        document.getElementById('game-instructions').textContent = 'Tap and hold to aim!';
        document.getElementById('restart-instructions').textContent = 'Tap anywhere to restart';
      }
    </script>
  </body>


</html>
